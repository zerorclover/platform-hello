name: platform-hello-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - perf
          - staging
          - production

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-west-2

jobs:
  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
        working-directory: backend

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Container image build
    runs-on: ubuntu-latest
    needs:
      - backend-test
    strategy:
      matrix:
        component:
          - backend
          - frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: false
          tags: platform-hello-${{ matrix.component }}:${{ github.sha }}

  security-scan:
    name: Filesystem security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  terraform-validate:
    name: Terraform validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - dev
          - test
          - perf
          - staging
          - production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform/envs/platform
      - run: terraform validate
        working-directory: infra/terraform/envs/platform

  policy:
    name: OPA policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
      - run: opa test policy/opa
      - run: |
          violations="$(opa eval --format raw --data policy/opa --input policy/opa/input/github_actions.json 'count(data.platform.pipeline.deny)')"
          test "$violations" = "0"

  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
    steps:
      - run: echo "terraform plan/apply -var environment=dev"

  deploy-test:
    name: Deploy test
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'test'
    steps:
      - run: echo "terraform plan/apply -var environment=test"

  deploy-perf:
    name: Deploy perf
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'perf'
    steps:
      - run: echo "terraform plan/apply -var environment=perf"

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    steps:
      - run: echo "terraform plan/apply -var environment=staging"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    steps:
      - run: echo "terraform plan/apply -var environment=production"
