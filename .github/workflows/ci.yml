name: platform-hello-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - perf
          - staging
          - production

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-west-2

jobs:
  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
        working-directory: backend

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Container image build
    runs-on: ubuntu-latest
    needs:
      - backend-test
    strategy:
      matrix:
        component:
          - backend
          - frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: false
          tags: platform-hello-${{ matrix.component }}:${{ github.sha }}

  security-scan:
    name: Filesystem security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  terraform-validate:
    name: Terraform validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: dev
            vpc_cidr: 10.10.0.0/16
            availability_zones: '["us-west-2a","us-west-2b"]'
            db_instance_class: db.t4g.micro
            desired_count: "1"
            deletion_protection: "false"
          - environment: test
            vpc_cidr: 10.20.0.0/16
            availability_zones: '["us-west-2a","us-west-2b"]'
            db_instance_class: db.t4g.micro
            desired_count: "1"
            deletion_protection: "false"
          - environment: perf
            vpc_cidr: 10.30.0.0/16
            availability_zones: '["us-west-2a","us-west-2b"]'
            db_instance_class: db.t4g.small
            desired_count: "2"
            deletion_protection: "false"
          - environment: staging
            vpc_cidr: 10.40.0.0/16
            availability_zones: '["us-west-2a","us-west-2b"]'
            db_instance_class: db.t4g.small
            desired_count: "2"
            deletion_protection: "true"
          - environment: production
            vpc_cidr: 10.50.0.0/16
            availability_zones: '["us-west-2a","us-west-2b"]'
            db_instance_class: db.t4g.medium
            desired_count: "3"
            deletion_protection: "true"
    env:
      TF_VAR_environment: ${{ matrix.environment }}
      TF_VAR_backend_image: example.com/platform-hello-backend:validate
      TF_VAR_frontend_image: example.com/platform-hello-frontend:validate
      TF_VAR_vpc_cidr: ${{ matrix.vpc_cidr }}
      TF_VAR_availability_zones: ${{ matrix.availability_zones }}
      TF_VAR_db_name: platform
      TF_VAR_db_username: platform
      TF_VAR_db_instance_class: ${{ matrix.db_instance_class }}
      TF_VAR_desired_count: ${{ matrix.desired_count }}
      TF_VAR_deletion_protection: ${{ matrix.deletion_protection }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform/envs/platform
      - run: terraform validate
        working-directory: infra/terraform/envs/platform

  policy:
    name: OPA policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
      - run: opa test policy/opa
      - run: |
          violations="$(opa eval --format raw --data policy/opa --input policy/opa/input/github_actions.json 'count(data.platform.pipeline.deny)')"
          test "$violations" = "0"

  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
    env:
      TF_VAR_environment: dev
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-dev-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-dev-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: terraform plan -out=tfplan
        working-directory: infra/terraform/envs/platform
      - run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform/envs/platform

  deploy-test:
    name: Deploy test
    runs-on: ubuntu-latest
    environment: test
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'test'
    env:
      TF_VAR_environment: test
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-test-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-test-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/test/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: terraform plan -out=tfplan
        working-directory: infra/terraform/envs/platform
      - run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform/envs/platform

  deploy-perf:
    name: Deploy perf
    runs-on: ubuntu-latest
    environment: perf
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'perf'
    env:
      TF_VAR_environment: perf
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-perf-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-perf-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/perf/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: terraform plan -out=tfplan
        working-directory: infra/terraform/envs/platform
      - run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform/envs/platform

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    env:
      TF_VAR_environment: staging
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-staging-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-staging-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/staging/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: terraform plan -out=tfplan
        working-directory: infra/terraform/envs/platform
      - run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform/envs/platform

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    env:
      TF_VAR_environment: production
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-production-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/platform-hello-production-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
