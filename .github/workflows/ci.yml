name: platform-hello-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - perf
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
        working-directory: backend

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Container image validation build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-test
    strategy:
      matrix:
        component:
          - backend
          - frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: false
          tags: platform-hello-${{ matrix.component }}:${{ github.sha }}

  prepare-environment:
    name: Prepare selected environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    needs:
      - docker-build
      - secret-scan
      - security-scan
      - terraform-validate
      - policy-environment
    if: github.event_name == 'workflow_dispatch'
    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/platform-hello-${{ inputs.environment }}-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/platform-hello-${{ inputs.environment }}-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_VAR_ecs_task_cpu: ${{ vars.ECS_TASK_CPU }}
      TF_VAR_ecs_task_memory: ${{ vars.ECS_TASK_MEMORY }}
      TF_VAR_log_retention_days: ${{ vars.LOG_RETENTION_DAYS }}
      TF_VAR_db_engine_version: ${{ vars.DB_ENGINE_VERSION }}
      TF_VAR_db_allocated_storage: ${{ vars.DB_ALLOCATED_STORAGE }}
      TF_VAR_db_backup_retention_days: ${{ vars.DB_BACKUP_RETENTION_DAYS }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/${TF_VAR_environment}/terraform.tfstate" \
            -backend-config="region=${TF_VAR_aws_region}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: |
          terraform apply -input=false -auto-approve \
            -target=module.platform.module.container_platform.aws_ecr_repository.backend \
            -target=module.platform.module.container_platform.aws_ecr_repository.frontend
        working-directory: infra/terraform/envs/platform

  package-images:
    name: Package environment images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    needs:
      - prepare-environment
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        component:
          - backend
          - frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/platform-hello-${{ inputs.environment }}-${{ matrix.component }}:${{ github.sha }}

  security-scan:
    name: Filesystem security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  terraform-validate:
    name: Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TF_VAR_environment: ${{ vars.TF_VALIDATE_ENVIRONMENT }}
      TF_VAR_aws_region: ${{ vars.TF_VALIDATE_AWS_REGION }}
      TF_VAR_backend_image: ${{ vars.TF_VALIDATE_BACKEND_IMAGE }}
      TF_VAR_frontend_image: ${{ vars.TF_VALIDATE_FRONTEND_IMAGE }}
      TF_VAR_vpc_cidr: ${{ vars.TF_VALIDATE_VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.TF_VALIDATE_AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.TF_VALIDATE_DB_NAME }}
      TF_VAR_db_username: ${{ vars.TF_VALIDATE_DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.TF_VALIDATE_DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.TF_VALIDATE_DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.TF_VALIDATE_DELETION_PROTECTION }}
      TF_VAR_ecs_task_cpu: ${{ vars.TF_VALIDATE_ECS_TASK_CPU }}
      TF_VAR_ecs_task_memory: ${{ vars.TF_VALIDATE_ECS_TASK_MEMORY }}
      TF_VAR_log_retention_days: ${{ vars.TF_VALIDATE_LOG_RETENTION_DAYS }}
      TF_VAR_db_engine_version: ${{ vars.TF_VALIDATE_DB_ENGINE_VERSION }}
      TF_VAR_db_allocated_storage: ${{ vars.TF_VALIDATE_DB_ALLOCATED_STORAGE }}
      TF_VAR_db_backup_retention_days: ${{ vars.TF_VALIDATE_DB_BACKUP_RETENTION_DAYS }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: node scripts/check-terraform-standards.mjs
      - run: terraform init -backend=false
        working-directory: infra/terraform/envs/platform
      - run: terraform validate
        working-directory: infra/terraform/envs/platform

  policy-common:
    name: OPA common policy checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
      - run: opa test policy/opa/common policy/opa/environments
      - run: |
          violations="$(opa eval --format raw --data policy/opa/common --input policy/input/github_actions.json 'count(data.platform.common.deny)')"
          test "$violations" = "0"

  policy-environment:
    name: OPA selected environment policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    needs:
      - policy-common
    if: github.event_name == 'workflow_dispatch'
    env:
      TARGET_ENV: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
      - run: opa test "policy/opa/environments/${TARGET_ENV}"
      - run: |
          query="count(data.platform.environments.${TARGET_ENV}.deny)"
          input_file="policy/input/environments/${TARGET_ENV}.json"
          violations="$(opa eval --format raw --data "policy/opa/environments/${TARGET_ENV}" --input "${input_file}" "${query}")"
          test "$violations" = "0"

  deploy:
    name: Deploy selected environment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    needs:
      - package-images
      - secret-scan
      - security-scan
      - terraform-validate
      - policy-environment
    if: github.event_name == 'workflow_dispatch'
    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_backend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/platform-hello-${{ inputs.environment }}-backend:${{ github.sha }}
      TF_VAR_frontend_image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/platform-hello-${{ inputs.environment }}-frontend:${{ github.sha }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
      TF_VAR_availability_zones: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TF_VAR_db_name: ${{ vars.DB_NAME }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS }}
      TF_VAR_desired_count: ${{ vars.DESIRED_COUNT }}
      TF_VAR_deletion_protection: ${{ vars.DELETION_PROTECTION }}
      TF_VAR_ecs_task_cpu: ${{ vars.ECS_TASK_CPU }}
      TF_VAR_ecs_task_memory: ${{ vars.ECS_TASK_MEMORY }}
      TF_VAR_log_retention_days: ${{ vars.LOG_RETENTION_DAYS }}
      TF_VAR_db_engine_version: ${{ vars.DB_ENGINE_VERSION }}
      TF_VAR_db_allocated_storage: ${{ vars.DB_ALLOCATED_STORAGE }}
      TF_VAR_db_backup_retention_days: ${{ vars.DB_BACKUP_RETENTION_DAYS }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=platform-hello/${TF_VAR_environment}/terraform.tfstate" \
            -backend-config="region=${TF_VAR_aws_region}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: infra/terraform/envs/platform
      - run: terraform plan -input=false -out=tfplan
        working-directory: infra/terraform/envs/platform
      - run: terraform apply -input=false -auto-approve tfplan
        working-directory: infra/terraform/envs/platform
